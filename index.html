<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel OFJ - Integrado PJe</title>
    <style>
        :root { --pje-blue: #0078aa; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header-app { background: var(--pje-blue); color: white; padding: 15px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .upload-area { background: white; padding: 20px; border: 2px dashed #ccc; text-align: center; border-radius: 0 0 8px 8px; margin-bottom: 20px; }
        .card-mandado { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid var(--pje-blue); }
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-top: 4px; font-size: 13px; }
        .btn-maps { background: #4285F4; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-app">
        <span>🏛️ TRIAGEM OFICIAL DE JUSTIÇA - PJe TJPE</span>
        <small id="contador">0 Mandados</small>
    </div>
    
    <div class="upload-area">
        <input type="file" id="arquivoPje" accept=".html,.htm" onchange="processarArquivo()">
        <p>Arraste o arquivo .html do seu Painel do Oficial para cá</p>
    </div>

    <div id="listaMandados"></div>
</div>

<script>
    function processarArquivo() {
        const file = document.getElementById('arquivoPje').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(e.target.result, "text/html");
            
            // Localiza a tabela de processos do PJe
            const linhasTabela = doc.querySelectorAll("tr[id^='j_id153:listagem:']");
            const mandados = [];

            linhasTabela.forEach(linha => {
                const colunas = linha.querySelectorAll("td");
                
                if (colunas.length >= 5) {
                    // 1. Processo (Coluna 2 - Atos de Comunicação contém o número)
                    const textoAtos = colunas[1].innerText;
                    const numProcesso = textoAtos.match(/\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4}/)?.[0] || "N/D";
                    
                    // 2. Destinatário (Geralmente na 4ª linha de texto dentro da coluna 2)
                    const linhasTexto = textoAtos.split('\n').map(t => t.trim()).filter(t => t !== "");
                    const destinatario = linhasTexto[3] || linhasTexto[0]; // Tenta a 4ª linha conforme regra

                    // 3. Próxima Audiência (Coluna 3)
                    const audiencia = colunas[2].innerText.trim();

                    // 4. Endereço (Coluna 4)
                    const endereco = colunas[3].innerText.trim();

                    mandados.push({ numProcesso, destinatario, audiencia, endereco });
                }
            });

            renderizar(mandados);
        };
        reader.readAsText(file);
    }

    function renderizar(lista) {
        const container = document.getElementById('listaMandados');
        const contDisp = document.getElementById('contador');
        container.innerHTML = "";
        contDisp.innerText = `${lista.length} Mandados Identificados`;

        lista.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card-mandado';
            card.innerHTML = `
                <div class="grid-campos">
                    <div>
                        <label>Processo</label>
                        <input type="text" value="${m.numProcesso}" readonly>
                    </div>
                    <div>
                        <label>Destinatário</label>
                        <input type="text" value="${m.destinatario}">
                    </div>
                    <div>
                        <label>Próxima Audiência</label>
                        <input type="text" value="${m.audiencia || 'Não agendada'}">
                    </div>
                </div>
                <div style="margin-top:10px">
                    <label>📍 Endereço de Diligência</label>
                    <input type="text" value="${m.endereco}">
                </div>
                <button class="btn-maps" onclick="window.open('https://www.google.com.br/maps/search/${encodeURIComponent(m.endereco)}')">
                    ABRIR NO GOOGLE MAPS
                </button>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
