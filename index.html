<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor Completo Lista PJe - TJPE</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f4f7;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:10px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}

small{ color:gray; }
</style>
</head>

<body>

<h2>Leitor Completo - Lista do Painel PJe</h2>

<div class="card">
<input type="file" accept="image/*" onchange="lerImagem(event)">
<div id="status"></div>
</div>

<div id="resultado"></div>

<script>

function lerImagem(event){
let file = event.target.files[0];
status.innerText = "Executando OCR...";

Tesseract.recognize(file,'por').then(({ data: { text } })=>{
status.innerText = "OCR concluído. Extraindo todos os mandados...";
processarTexto(text);
});
}

function processarTexto(texto){

resultado.innerHTML = "";

let linhas = texto.split("\n").map(l => l.trim()).filter(l => l.length > 0);

let mandados = [];
let atual = {};

for(let i=0; i<linhas.length; i++){

let linha = linhas[i];

/* Identifica Vara */
if(linha.match(/^\d+ª?\s*Vara/i)){
atual.vara = linha;
}

/* Destinatário */
if(linha.match(/Destinat[aá]rio/)){
let nome = linha.replace(/Destinat[aá]rio\(s\)?/i,"").trim();
atual.destinatario = nome;
}

/* Distribuição */
if(linha.match(/Distribui[cç][aã]o/i)){
let data = linha.match(/\d{2}\/\d{2}\/\d{4}/);
if(data) atual.distribuicao = data[0];
}

/* Audiência (captura datas isoladas que não sejam distribuição) */
if(linha.match(/\d{2}\/\d{2}\/\d{4}/) && !linha.match(/Distribui/)){
if(!atual.audiencia){
atual.audiencia = linha.match(/\d{2}\/\d{2}\/\d{4}/)[0];
}
}

/* Endereço (linha com CEP) */
if(linha.match(/CEP/i)){
atual.endereco = linha;
}

/* Se encontrou Distribuição, considera bloco fechado */
if(linha.match(/Distribui[cç][aã]o/i)){
mandados.push({...atual});
atual = {};
}

}

/* Renderiza todos */

mandados.forEach((m, index)=>{

let div = document.createElement("div");
div.className="card";

div.innerHTML=`
<b>Mandado ${index+1}</b><br><br>
<b>Vara:</b> ${m.vara || "-"}<br>
<b>Destinatário:</b> ${m.destinatario || "-"}<br>
<b>Endereço:</b> ${m.endereco || "-"}<br>
<b>Distribuição:</b> ${m.distribuicao || "-"}<br>
<b>Audiência:</b> ${m.audiencia || "-"}
`;

resultado.appendChild(div);

});

status.innerText = mandados.length + " mandado(s) identificado(s).";

}

</script>

</body>
</html>
